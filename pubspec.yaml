name: smart_note_ai
description: "智能便签跨平台应用"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  dio: ^5.9.2
  intl: ^0.20.2
  google_fonts: ^8.0.2
  flutter_local_notifications: ^21.0.0
  android_intent_plus: ^6.0.0
  url_launcher: ^6.3.2
  timezone: ^0.11.0
  uuid: ^4.5.3
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  hive_flutter: ^1.1.0
  getwidget: ^7.0.0
  flutter_slidable: ^4.0.3
  table_calendar: ^3.2.0
  badges: ^3.2.0
  modal_bottom_sheet: ^3.0.0
  fluttertoast: ^9.0.0
  animations: ^2.2.0
  flutter_screenutil: ^5.9.3
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFE680"
  adaptive_icon_foreground: assets/icon/app_icon.png
